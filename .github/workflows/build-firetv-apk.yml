name: Build Fire TV APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: URL opened by the Fire TV application
        required: true
        default: https://tv.flixhdmax.com/
        type: string

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.9'
          cache-provider: basic

      - name: Build installable debug APK
        working-directory: firetv-apk
        run: gradle :app:assembleDebug -PappUrl="${{ inputs.app_url }}" --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: FlixHDMax-TV-APK
          path: firetv-apk/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
