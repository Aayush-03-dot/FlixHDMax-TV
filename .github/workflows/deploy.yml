name: Deploy FlixHDMax

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy:
    runs-on: [self-hosted, flixhdmax-dell]

    steps:
      - name: Update live project folder to release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          cd /home/coffee/apps/flixhdmax

          git fetch origin --force --tags

          RELEASE_COMMIT="$(git rev-list -n 1 "$RELEASE_TAG")"

          if [ -z "$RELEASE_COMMIT" ]; then
            echo "Unable to resolve release tag: $RELEASE_TAG"
            exit 1
          fi

          git checkout --detach --force "$RELEASE_COMMIT"
          git reset --hard "$RELEASE_COMMIT"

          echo "Deploying $RELEASE_TAG at commit $RELEASE_COMMIT"

      - name: Check Infisical CLI is installed
        run: |
          if ! command -v infisical >/dev/null 2>&1; then
            echo "Infisical CLI is not installed on the Zorin server."
            echo "Install it once on Zorin before using this workflow."
            exit 1
          fi

          infisical --version

      - name: Write production env from Infisical
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
        run: |
          INFISICAL_TOKEN=$(infisical login \
            --domain=https://eu.infisical.com \
            --method=universal-auth \
            --client-id="$INFISICAL_CLIENT_ID" \
            --client-secret="$INFISICAL_CLIENT_SECRET" \
            --silent \
            --plain)

          infisical export \
            --domain=https://eu.infisical.com \
            --token="$INFISICAL_TOKEN" \
            --projectId=61ef0ae7-e2ca-41ba-b622-2f22ff353560 \
            --env=prod \
            --path=/ \
            --format=dotenv \
            > /home/coffee/apps/flixhdmax/Backend/FlixHDMax_Backend/.env

          chmod 600 /home/coffee/apps/flixhdmax/Backend/FlixHDMax_Backend/.env

      - name: Install backend dependencies
        run: |
          cd /home/coffee/apps/flixhdmax/Backend/FlixHDMax_Backend

          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip

      - name: Restart backend
        run: |
          sudo /usr/local/bin/flixhd-restart-backend

      - name: Install frontend dependencies
        run: |
          cd /home/coffee/apps/flixhdmax/frontend
          npm ci

      - name: Build frontend
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: |
          cd /home/coffee/apps/flixhdmax/frontend
          npm run build

      - name: Publish frontend
        run: |
          rsync -av --delete \
            --exclude='previews/' \
            /home/coffee/apps/flixhdmax/frontend/dist/ \
            /var/www/flixhd/